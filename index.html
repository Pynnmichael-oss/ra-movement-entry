<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA Movement Entry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --amber:     #f59e0b;
      --amber-dim: #92600a;
      --text:      #d4d4d4;
      --text-dim:  #737373;
      --danger:    #ef4444;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--amber);
      padding: 12px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--amber);
      letter-spacing: 0.04em;
    }
    header span {
      font-size: 12px;
      color: var(--text-dim);
    }
    header nav {
      margin-left: auto;
      display: flex;
      gap: 2px;
      align-items: center;
    }
    header nav a {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-dim);
      padding: 5px 12px;
      border: 1px solid transparent;
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
    header nav a:hover { color: var(--text); border-color: var(--border); }
    header nav a.active { color: var(--amber); border-color: var(--amber-dim); }

    /* ── Layout ── */
    main { padding: 20px 24px; max-width: 1600px; }

    /* ── SP Status Banner ── */
    #sp-banner {
      display: none;
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 14px;
      margin-bottom: 16px;
      border-radius: 2px;
      align-items: center;
      gap: 10px;
    }
    #sp-banner.loading {
      display: flex;
      background: rgba(245,158,11,0.08);
      border: 1px solid var(--amber-dim);
      color: var(--amber);
    }
    #sp-banner.error {
      display: flex;
      background: rgba(239,68,68,0.08);
      border: 1px solid #7f1d1d;
      color: var(--danger);
    }
    #sp-banner-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      line-height: 1;
      font-family: var(--mono);
      letter-spacing: normal;
      text-transform: none;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid var(--amber-dim);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section headings ── */
    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--amber);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 14px;
    }

    /* ── Form ── */
    #entry-form {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 18px 20px;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field.required label::after {
      content: ' *';
      color: var(--amber);
    }
    .field label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      font-family: var(--sans);
      letter-spacing: 0.03em;
    }
    .field input,
    .field select,
    .field textarea {
      background: #111;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 2px;
      width: 100%;
      transition: border-color 0.15s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--amber);
    }
    .field input.error,
    .field select.error {
      border-color: var(--danger);
    }
    .field input:disabled,
    .field select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .field select option { background: #111; }

    .form-divider {
      grid-column: 1 / -1;
      border: none;
      border-top: 1px dashed var(--border);
      margin: 4px 0;
    }

    /* ── Form actions ── */
    .form-actions {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      padding: 8px 18px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #btn-add {
      background: var(--amber);
      color: #0f0f0f;
    }
    #btn-add:hover:not(:disabled) { background: #fbbf24; }
    #btn-add:disabled {
      background: var(--amber-dim);
      color: #5a3d05;
      cursor: not-allowed;
      opacity: 0.6;
    }
    #btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    #btn-clear:hover { border-color: var(--text-dim); color: var(--text); }

    #form-error {
      display: none;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.08);
      border: 1px solid #7f1d1d;
      border-left: 3px solid var(--danger);
      font-size: 12px;
      color: var(--danger);
      font-family: var(--mono);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #form-error.visible { display: block; }

    /* ── Table section ── */
    #table-section { margin-bottom: 24px; }

    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #row-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    #btn-export {
      background: var(--amber);
      color: #0f0f0f;
      padding: 8px 20px;
    }
    #btn-export:hover:not(:disabled) { background: #fbbf24; }
    #btn-export:disabled {
      background: var(--amber-dim);
      color: #5a3d05;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1200px;
    }
    thead {
      background: #111;
      position: sticky;
      top: 0;
    }
    thead th {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--amber);
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
    }
    tbody tr:hover { background: #1f1f1f; }
    tbody td {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      vertical-align: middle;
      white-space: nowrap;
    }
    tbody td.actions {
      white-space: nowrap;
      display: flex;
      gap: 6px;
    }
    .btn-edit, .btn-delete {
      font-size: 11px;
      padding: 3px 9px;
    }
    .btn-edit {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-edit:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
    .btn-delete {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-delete:hover:not(:disabled) { border-color: var(--danger); color: var(--danger); }
    .btn-edit:disabled, .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Sent row styling ── */
    tr.row-sent { opacity: 0.4; }
    tr.row-sent:hover { opacity: 0.5; background: transparent; }
    .badge-sent {
      display: inline-block;
      background: #222;
      border: 1px solid #444;
      color: #737373;
      font-size: 10px;
      font-family: var(--mono);
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .badge-pending {
      display: inline-block;
      border: 1px solid var(--amber-dim);
      color: var(--amber-dim);
      font-size: 10px;
      font-family: var(--mono);
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 2px;
      white-space: nowrap;
    }

    #empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    /* ── Edit modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--surface);
      border: 1px solid var(--amber);
      padding: 24px;
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-header h2 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--amber);
    }
    #modal-close {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    #modal-close:hover { color: var(--text); }
    .modal-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #btn-modal-save {
      background: var(--amber);
      color: #0f0f0f;
    }
    #btn-modal-save:hover:not(:disabled) { background: #fbbf24; }
    #btn-modal-save:disabled {
      background: var(--amber-dim);
      color: #5a3d05;
      cursor: not-allowed;
      opacity: 0.6;
    }
    #btn-modal-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    #modal-error {
      font-size: 12px;
      color: var(--danger);
      font-family: var(--mono);
    }

  </style>
</head>
<body>

<header>
  <h1>RA Movement Entry</h1>
  <span>RightAngle ETRM Import Tool</span>
  <nav>
    <a href="index.html" class="active">Manual Entry</a>
    <a href="email-processor.html">PDF Processor</a>
    <a href="walkthrough.html">Guide</a>
  </nav>
  <span id="header-user" style="font-family:var(--mono); font-size:12px; color:var(--text-dim);"></span>
</header>

<main>

  <!-- ── SP Status Banner ── -->
  <div id="sp-banner">
    <span class="spinner" id="sp-spinner"></span>
    <span id="sp-banner-msg"></span>
    <button id="sp-banner-dismiss" style="display:none;">&times;</button>
  </div>

  <!-- ── Entry Form ── -->
  <section id="entry-form">
    <div class="section-label">New Movement</div>

    <div class="form-grid">
      <!-- Required -->
      <div class="field required">
        <label for="f-ExtDocNum">ExternalDocumentNumber</label>
        <input type="text" id="f-ExtDocNum" placeholder="e.g. MOV-2024-001" />
      </div>
      <div class="field required">
        <label for="f-MovDate">MovementDate</label>
        <input type="datetime-local" id="f-MovDate" />
      </div>
      <div class="field required">
        <label for="f-Location">Location</label>
        <input type="text" id="f-Location" placeholder="e.g. TANK-101" />
      </div>
      <div class="field required">
        <label for="f-MovedProduct">MovedProduct</label>
        <input type="text" id="f-MovedProduct" placeholder="e.g. Crude Oil WTI" />
      </div>
      <div class="field required">
        <label for="f-NetVolume">NetVolume</label>
        <input type="number" id="f-NetVolume" step="0.01" placeholder="0.00" />
      </div>
      <div class="field required">
        <label for="f-VolumeUOM">VolumeUOM</label>
        <select id="f-VolumeUOM">
          <option value="">-- select --</option>
          <option value="bbl">bbl</option>
          <option value="gal">gal</option>
          <option value="mcf">mcf</option>
        </select>
      </div>

      <hr class="form-divider" />

      <!-- Optional -->
      <div class="field">
        <label for="f-MovDocDate">MovementDocumentDate</label>
        <input type="date" id="f-MovDocDate" />
      </div>
      <div class="field">
        <label for="f-Type">Type</label>
        <select id="f-Type">
          <option value=""></option>
          <option value="Production">Production</option>
          <option value="Receipt">Receipt</option>
          <option value="Delivery">Delivery</option>
          <option value="Inventory">Inventory</option>
        </select>
      </div>
      <div class="field">
        <label for="f-DeliveryBA">DeliveryBA</label>
        <input type="text" id="f-DeliveryBA" placeholder="Counterparty / supplier" />
      </div>
    </div>

    <div class="form-actions">
      <button id="btn-add">+ Add Row</button>
      <button id="btn-clear">Clear</button>
    </div>
    <div id="form-error"></div>
  </section>

  <!-- ── Table ── -->
  <section id="table-section">
    <div class="table-toolbar">
      <div class="section-label" style="margin-bottom:0; border:none;">Movements</div>
      <div style="display:flex;align-items:center;gap:14px;">
        <span id="row-count">0 rows</span>
        <button id="btn-export" disabled>Export Pending (.xlsx)</button>
      </div>
    </div>

    <div id="empty-state">No movements added yet. Fill in the form above and click + Add Row.</div>
    <div class="table-wrap" id="table-wrap" style="display:none;">
      <table id="movements-table">
        <thead>
          <tr id="thead-row"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>

</main>

<!-- ── Edit Modal ── -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header">
      <h2>Edit Movement</h2>
      <button id="modal-close">&times;</button>
    </div>
    <div class="form-grid" id="modal-grid"></div>
    <div class="modal-actions">
      <button id="btn-modal-save">Save Changes</button>
      <button id="btn-modal-cancel">Cancel</button>
      <span id="modal-error"></span>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase Config ───────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            'AIzaSyBk5oxlIH3jhFPdkGFUrbMBv05wO2gpdeg',
  authDomain:        'ra-movement-entry.firebaseapp.com',
  projectId:         'ra-movement-entry',
  storageBucket:     'ra-movement-entry.firebasestorage.app',
  messagingSenderId: '718004979233',
  appId:             '1:718004979233:web:1b2e317c0d5121a0a70560',
});
const db   = firebase.firestore();
const COLL = db.collection('ra_movements');

// ── Firestore CRUD ────────────────────────────────────────────────────────────
async function dbGetAll() {
  const snap = await COLL.orderBy('enteredAt', 'asc').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function dbCreate(mov) {
  const ref = await COLL.add(mov);
  return { id: ref.id, ...mov };
}

async function dbUpdate(id, fields) {
  await COLL.doc(id).update(fields);
}

async function dbDelete(id) {
  await COLL.doc(id).delete();
}

// ── Status banner helpers ─────────────────────────────────────────────────────
const spBanner  = document.getElementById('sp-banner');
const spMsg     = document.getElementById('sp-banner-msg');
const spSpinner = document.getElementById('sp-spinner');
const spDismiss = document.getElementById('sp-banner-dismiss');

spDismiss.addEventListener('click', () => {
  spBanner.className = '';
  spBanner.style.display = 'none';
});

function showLoading(msg) {
  spBanner.className   = 'loading';
  spMsg.textContent    = msg;
  spSpinner.style.display = 'inline-block';
  spDismiss.style.display = 'none';
}

function showSpError(msg) {
  spBanner.className   = 'error';
  spMsg.textContent    = msg;
  spSpinner.style.display = 'none';
  spDismiss.style.display = 'inline-block';
}

function hideSpBanner() {
  spBanner.className      = '';
  spBanner.style.display  = 'none';
}

// ── Column definitions ────────────────────────────────────────────────────────
const COLUMNS = [
  { key: 'ExternalDocumentNumber', label: 'ExternalDocumentNumber', type: 'text',    required: true  },
  { key: 'MovementDate',           label: 'MovementDate',           type: 'datetime', required: true  },
  { key: 'Location',               label: 'Location',               type: 'text',    required: true  },
  { key: 'MovedProduct',           label: 'MovedProduct',           type: 'text',    required: true  },
  { key: 'NetVolume',              label: 'NetVolume',              type: 'number',  required: true,  decimals: 2 },
  { key: 'VolumeUOM',              label: 'VolumeUOM',              type: 'select',  required: true,  options: ['bbl','gal','mcf'] },
  { key: 'MovementDocumentDate',   label: 'MovementDocumentDate',   type: 'date',    required: false },
  { key: 'Type',                   label: 'Type',                   type: 'select',  required: false, options: ['','Production','Receipt','Delivery','Inventory'] },
  { key: 'DeliveryBA',             label: 'DeliveryBA',             type: 'text',    required: false },
];

const FIELD_MAP = {
  'f-ExtDocNum':  'ExternalDocumentNumber',
  'f-MovDate':    'MovementDate',
  'f-Location':   'Location',
  'f-MovedProduct':'MovedProduct',
  'f-NetVolume':  'NetVolume',
  'f-VolumeUOM':  'VolumeUOM',
  'f-MovDocDate': 'MovementDocumentDate',
  'f-Type':       'Type',
  'f-DeliveryBA': 'DeliveryBA',
};

const LS_USERNAME = 'ra_username';

// ── State ─────────────────────────────────────────────────────────────────────
let movements = [];
let username  = '';
let editId    = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatMovementDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  let hours = d.getHours();
  const mins = String(d.getMinutes()).padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()} ${hours}:${mins} ${ampm}`;
}

function formatDocDate(isoStr) {
  if (!isoStr) return '';
  const [y, m, dd] = isoStr.split('-');
  return `${parseInt(m)}/${parseInt(dd)}/${y}`;
}

function formatNumber(val, decimals) {
  if (val === '' || val === null || val === undefined) return '';
  const n = parseFloat(val);
  return isNaN(n) ? '' : n.toFixed(decimals);
}

function isoDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Username ──────────────────────────────────────────────────────────────────
function initUsername() {
  let name = localStorage.getItem(LS_USERNAME);
  if (!name) {
    name = prompt('Welcome! Please enter your name:') || 'Unknown';
    localStorage.setItem(LS_USERNAME, name);
  }
  document.getElementById('header-user').textContent = name;
  return name;
}

// ── Read form ─────────────────────────────────────────────────────────────────
function readForm(prefix) {
  const data = {};
  if (prefix === 'modal-') {
    COLUMNS.forEach(col => {
      const el = document.getElementById('modal-' + col.key);
      if (el) data[col.key] = el.value;
    });
  } else {
    Object.entries(FIELD_MAP).forEach(([fieldId, colKey]) => {
      const el = document.getElementById(fieldId);
      if (el) data[colKey] = el.value;
    });
  }
  return data;
}

function validateData(data) {
  return COLUMNS.filter(c => c.required && (!data[c.key] || !data[c.key].trim())).map(c => c.label);
}

// ── Build table header ────────────────────────────────────────────────────────
function buildHeader() {
  const tr = document.getElementById('thead-row');
  tr.innerHTML = '';
  ['', 'Status', 'Entered By', 'Entered At', ...COLUMNS.map(c => c.label)].forEach(label => {
    const th = document.createElement('th');
    th.textContent = label;
    tr.appendChild(th);
  });
}

// ── Render table ──────────────────────────────────────────────────────────────
function renderTable() {
  const tbody     = document.getElementById('tbody');
  const empty     = document.getElementById('empty-state');
  const wrap      = document.getElementById('table-wrap');
  const countEl   = document.getElementById('row-count');
  const exportBtn = document.getElementById('btn-export');

  tbody.innerHTML = '';

  const pendingCount = movements.filter(r => r.status === 'pending').length;
  countEl.textContent = `${movements.length} total, ${pendingCount} pending`;
  exportBtn.disabled  = pendingCount === 0;

  if (movements.length === 0) {
    empty.style.display = 'block';
    wrap.style.display  = 'none';
    return;
  }
  empty.style.display = 'none';
  wrap.style.display  = 'block';

  movements.forEach(row => {
    const sent = row.status === 'sent';
    const tr   = document.createElement('tr');
    if (sent) tr.classList.add('row-sent');

    const tdAct = document.createElement('td');
    tdAct.className = 'actions';
    if (!sent) {
      const btnEdit = document.createElement('button');
      btnEdit.className   = 'btn-edit';
      btnEdit.textContent = 'Edit';
      btnEdit.onclick     = () => openModal(row.id);
      const btnDel = document.createElement('button');
      btnDel.className   = 'btn-delete';
      btnDel.textContent = 'Del';
      btnDel.onclick     = () => deleteRow(row.id, btnDel, btnEdit);
      tdAct.appendChild(btnEdit);
      tdAct.appendChild(btnDel);
    }
    tr.appendChild(tdAct);

    const tdStatus = document.createElement('td');
    const badge    = document.createElement('span');
    badge.className   = sent ? 'badge-sent' : 'badge-pending';
    badge.textContent = sent ? 'SENT' : 'PENDING';
    tdStatus.appendChild(badge);
    if (sent && row.sentAt) {
      const sentDate = document.createElement('div');
      sentDate.style.cssText = 'font-size:10px; color:var(--text-dim); margin-top:2px; font-family:var(--mono);';
      sentDate.textContent = new Date(row.sentAt).toLocaleString();
      tdStatus.appendChild(sentDate);
    }
    tr.appendChild(tdStatus);

    const tdBy = document.createElement('td');
    tdBy.textContent = row.enteredBy || '';
    tr.appendChild(tdBy);

    const tdAt = document.createElement('td');
    tdAt.textContent = row.enteredAt ? new Date(row.enteredAt).toLocaleString() : '';
    tr.appendChild(tdAt);

    COLUMNS.forEach(col => {
      const td = document.createElement('td');
      let val  = row[col.key] || '';
      if (col.type === 'datetime')                           val = formatMovementDate(val);
      else if (col.type === 'date')                          val = formatDocDate(val);
      else if (col.type === 'number' && col.decimals != null) val = formatNumber(val, col.decimals);
      td.textContent = val;
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

// ── Add row ───────────────────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', async () => {
  const fields = readForm('');
  const errors = validateData(fields);

  document.querySelectorAll('#entry-form input.error, #entry-form select.error')
    .forEach(el => el.classList.remove('error'));

  if (errors.length > 0) {
    showFormError('Missing required fields:\n' + errors.map(e => '  • ' + e).join('\n'));
    Object.entries(FIELD_MAP).forEach(([fieldId, colKey]) => {
      if (errors.includes(colKey)) document.getElementById(fieldId)?.classList.add('error');
    });
    return;
  }

  hideFormError();
  const movement = {
    status:      'pending',
    enteredBy:   username,
    enteredAt:   new Date().toISOString(),
    exportBatch: null,
    sentAt:      null,
    ...fields,
  };

  const btn = document.getElementById('btn-add');
  btn.disabled    = true;
  btn.textContent = 'Saving...';
  showLoading('Saving movement...');

  try {
    const created = await dbCreate(movement);
    movements.push(created);
    renderTable();
    clearForm();
    hideSpBanner();
  } catch (err) {
    console.error('dbCreate failed:', err);
    showFormError('Error saving: ' + err.message);
    showSpError(err.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = '+ Add Row';
  }
});

// ── Clear form ────────────────────────────────────────────────────────────────
// ── Form error helpers ────────────────────────────────────────────────────────
function showFormError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.classList.add('visible');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function hideFormError() {
  const el = document.getElementById('form-error');
  el.textContent = '';
  el.classList.remove('visible');
}

function clearForm() {
  Object.keys(FIELD_MAP).forEach(fieldId => {
    const el = document.getElementById(fieldId);
    if (el) { el.value = ''; el.classList.remove('error'); }
  });
  hideFormError();
}
document.getElementById('btn-clear').addEventListener('click', clearForm);

// ── Delete row ────────────────────────────────────────────────────────────────
async function deleteRow(id, btnDel, btnEdit) {
  if (btnDel) { btnDel.disabled = true; btnDel.textContent = '...'; }
  if (btnEdit) btnEdit.disabled = true;
  showLoading('Deleting...');

  try {
    await dbDelete(id);
    movements = movements.filter(r => r.id !== id);
    renderTable();
    hideSpBanner();
  } catch (err) {
    showSpError('Delete failed: ' + err.message);
    if (btnDel) { btnDel.disabled = false; btnDel.textContent = 'Del'; }
    if (btnEdit) btnEdit.disabled = false;
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editId = id;
  const row  = movements.find(r => r.id === id);
  const grid = document.getElementById('modal-grid');
  grid.innerHTML = '';
  document.getElementById('modal-error').textContent = '';

  COLUMNS.forEach((col, i) => {
    const div = document.createElement('div');
    div.className = 'field' + (col.required ? ' required' : '');

    const lbl = document.createElement('label');
    lbl.setAttribute('for', 'modal-' + col.key);
    lbl.textContent = col.label;
    div.appendChild(lbl);

    let el;
    if (col.type === 'select') {
      el = document.createElement('select');
      (col.options || []).forEach(opt => {
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt || '-- none --';
        if (row[col.key] === opt) o.selected = true;
        el.appendChild(o);
      });
    } else {
      el = document.createElement('input');
      el.type  = col.type === 'datetime' ? 'datetime-local' : col.type === 'date' ? 'date' : col.type === 'number' ? 'number' : 'text';
      if (col.type === 'number') el.step = col.decimals === 4 ? '0.0001' : '0.01';
      el.value = row[col.key] || '';
    }
    el.id = 'modal-' + col.key;
    div.appendChild(el);
    grid.appendChild(div);

    if (i === 5) {
      const hr = document.createElement('hr');
      hr.className = 'form-divider';
      grid.appendChild(hr);
    }
  });

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('btn-modal-save').addEventListener('click', async () => {
  const fields   = readForm('modal-');
  const errors   = validateData(fields);
  const modalErr = document.getElementById('modal-error');

  if (errors.length > 0) {
    modalErr.textContent = 'Required: ' + errors.join(', ');
    return;
  }
  modalErr.textContent = '';

  const idx = movements.findIndex(r => r.id === editId);
  if (idx === -1) { closeModal(); return; }

  const btn = document.getElementById('btn-modal-save');
  btn.disabled    = true;
  btn.textContent = 'Saving...';

  try {
    await dbUpdate(editId, fields);
    movements[idx] = { ...movements[idx], ...fields };
    renderTable();
    closeModal();
    hideSpBanner();
  } catch (err) {
    modalErr.textContent = 'Error: ' + err.message;
    showSpError(err.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Save Changes';
  }
});

// ── XML Export ────────────────────────────────────────────────────────────────
const EMPTY_TAG_FIELDS = new Set([
  'LCLeaseName','LCLeaseNumber','LeaseProduct',
  'TaxOrigin','TaxDestination','CarrierBusinessAssociate',
  'LoadMeasurementType','ReasonCode'
]);

const SELF_CLOSE_FIELDS = new Set([
  'NetMass','GrossMass','PrimaryProvisionValueOverride',
  'SecondaryProvisionValueOverride','Description',
  'LabAnalysis','LiftingNumber','AncillaryNumber','Notes'
]);

function xmlEscape(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtMovDateXml(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()} 12:00 AM`;
}

function fmtVol(val, decimals) {
  if (val === '' || val === null || val === undefined) return '';
  const n = parseFloat(val);
  return isNaN(n) ? '' : n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function tag(name, value) {
  if (SELF_CLOSE_FIELDS.has(name)) return `    <${name} />\n`;
  const v = (value === '' || value === null || value === undefined)
    ? (EMPTY_TAG_FIELDS.has(name) ? '(Empty)' : '')
    : value;
  if (v === '' && !EMPTY_TAG_FIELDS.has(name)) return `    <${name} />\n`;
  return `    <${name}>${xmlEscape(v)}</${name}>\n`;
}

function buildXml(rows) {
  let xml = '<?xml version="1.0" encoding="utf-16"?>\n<Data>\n';
  rows.forEach((row, idx) => {
    xml += '  <Row>\n';
    xml += tag('ExternalDocumentNumber', row.ExternalDocumentNumber);
    xml += tag('Line_x0023_', String(idx + 1));
    xml += tag('Status', '');
    xml += tag('MovementDate', fmtMovDateXml(row.MovementDate));
    xml += tag('Location', row.Location);
    xml += tag('MovedProduct', row.MovedProduct);
    xml += tag('Type', row.Type);
    xml += tag('NetVolume', fmtVol(row.NetVolume, 2));
    xml += tag('GrossVolume', '');
    xml += tag('VolumeUOM', row.VolumeUOM);
    xml += tag('NetMass', '');
    xml += tag('GrossMass', '');
    xml += `    <MassUOM>lbs</MassUOM>\n`;
    xml += tag('SpecificGravity', '');
    xml += tag('APIGravity', '');
    xml += tag('ReceiptDealNumber', '');
    xml += tag('ReceiptDealDetail', '');
    xml += tag('ReceiptBA', '');
    xml += tag('DeliveryDealNumber', '');
    xml += tag('DeliveryDealDetail', '');
    xml += tag('DeliveryBA', row.DeliveryBA);
    xml += tag('MovementExpenses', '0');
    xml += tag('LCLeaseName', '');
    xml += tag('LCLeaseNumber', '');
    xml += tag('LeaseProduct', '');
    xml += tag('PrimaryProvisionValueOverride', '');
    xml += tag('SecondaryProvisionValueOverride', '');
    xml += tag('Description', '');
    xml += tag('TaxOrigin', '');
    xml += tag('TaxDestination', '');
    xml += tag('CarrierBusinessAssociate', '');
    xml += tag('LabAnalysis', '');
    xml += tag('LiftingNumber', '');
    xml += tag('AncillaryNumber', '');
    xml += `    <AutomatchStatus>Successfully Automatched</AutomatchStatus>\n`;
    xml += tag('LoadMeasurementType', '');
    xml += tag('ReasonCode', '');
    xml += tag('Notes', '');
    xml += tag('InternalDocumentNumber', '');
    xml += tag('MovementDocumentDate', formatDocDate(row.MovementDocumentDate));
    xml += '  </Row>\n';
  });
  xml += '</Data>';
  return xml;
}

document.getElementById('btn-export').addEventListener('click', async () => {
  const pending = movements.filter(r => r.status === 'pending');
  if (pending.length === 0) return;

  // Download file immediately — don't block on SP updates
  const xmlString = buildXml(pending);
  const blob = new Blob([xmlString], { type: 'application/vnd.ms-excel' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `RA_movements_${isoDateStr(new Date())}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);

  // Mark as sent in SP
  const btn = document.getElementById('btn-export');
  btn.disabled    = true;
  btn.textContent = 'Marking Sent...';
  showLoading(`Marking ${pending.length} movements as sent...`);

  const batch       = 'BATCH-' + Date.now();
  const sentAt      = new Date().toISOString();
  const exportedIds = new Set(pending.map(r => r.id));

  try {
    await Promise.all(
      pending.map(r => dbUpdate(r.id, { status: 'sent', sentAt, exportBatch: batch }))
    );
    movements = movements.map(r =>
      exportedIds.has(r.id) ? { ...r, status: 'sent', sentAt, exportBatch: batch } : r
    );
    renderTable();
    hideSpBanner();
  } catch (err) {
    showSpError('Export marking failed: ' + err.message + ' — file was downloaded but some rows may still show as pending.');
    try {
      movements = await dbGetAll();
      renderTable();
    } catch { /* ignore */ }
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Export Pending (.xlsx)';
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
username = initUsername();
buildHeader();
renderTable();

(async () => {
  const empty = document.getElementById('empty-state');
  empty.textContent = 'Connecting to Firebase...';
  showLoading('Loading movements from Firebase...');

  try {
    movements = await dbGetAll();
    renderTable();
    hideSpBanner();
  } catch (err) {
    empty.textContent = 'Could not load from Firebase. See error above.';
    showSpError(err.message);
  }
})();
</script>
